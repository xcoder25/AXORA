<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axora Boot Sequence</title>
  <style>
    :root {
      --bg-color: #040814;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary: #8b5cf6; /* violet-500 */
      --accent: #10b981;  /* emerald-500 */
      --text: #f3f4f6;    /* gray-100 */
      --text-muted: #9ca3af; /* gray-400 */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* Animated background mesh gradient */
    body::before {
      content: "";
      position: absolute;
      inset: -50%;
      z-index: -1;
      opacity: 0.6;
      background: 
        radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
      filter: blur(80px);
      animation: float-bg 10s ease-in-out infinite alternate;
    }

    @keyframes float-bg {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(5%, 5%) rotate(5deg); }
    }

    .container {
      text-align: center;
      padding: 3rem;
      border-radius: 24px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      width: 420px;
      max-width: 90%;
      -webkit-app-region: no-drag;
      animation: zoom-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes zoom-in {
      from { transform: scale(0.9) translateY(10px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    .logo-container {
      margin-bottom: 2rem;
      position: relative;
      display: inline-block;
    }

    .logo-glow {
      position: absolute;
      inset: -10px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
      filter: blur(5px);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, var(--primary) 0%, #a78bfa 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.2rem;
      display: block;
      text-shadow: 0 0 30px rgba(139, 92, 246, 0.25);
    }

    .tagline {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--accent);
      font-weight: 600;
      text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
      margin-bottom: 2.5rem;
    }

    .status-container {
      margin-top: 1rem;
    }

    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.8rem;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--primary), var(--accent));
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
      animation: loading 3.5s cubic-bezier(0.1, 0.8, 0.1, 1) forwards;
    }

    @keyframes loading {
      0% { width: 0%; }
      20% { width: 15%; }
      45% { width: 55%; }
      75% { width: 85%; }
      100% { width: 100%; }
    }

    .status-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 500;
      display: inline-block;
      min-height: 15px;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <span class="logo">AXORA</span>
    </div>
    <div class="tagline">Institutional OS</div>
    
    <div class="status-container">
      <div class="progress-bar-bg">
        <div class="progress-bar"></div>
      </div>
      <div class="status-text" id="status-label">Initializing Neural Interface...</div>
    </div>

    <div class="footer">Powered by Nexora</div>
  </div>

  <script>
    const statuses = [
      "Loading deep vision models...",
      "Connecting to telemetry gateway...",
      "Syncing secure institution node...",
      "Establishing neural interface...",
      "Booting Axora OS..."
    ];

    const label = document.getElementById("status-label");
    let currentIdx = 0;

    const interval = setInterval(() => {
      if (currentIdx < statuses.length) {
        label.style.opacity = 0;
        setTimeout(() => {
          label.textContent = statuses[currentIdx++];
          label.style.opacity = 1;
        }, 300);
      } else {
        clearInterval(interval);
      }
    }, 600);
  </script>
</body>
</html>
